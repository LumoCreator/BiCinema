<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumoCinema Pro</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --accent: #ff003c;
            --accent-glow: rgba(255, 0, 60, 0.5);
            --card-bg: #111111;
            --glass: rgba(255, 255, 255, 0.03);
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        * { box-sizing: border-box; outline: none; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* Задний фон с живыми частицами (визуально) */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
            z-index: -1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 60px;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #fff 30%, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--accent-glow));
        }

        /* CATALOG GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 40px;
        }

        .card {
            position: relative;
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card:hover {
            transform: scale(1.03) translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5), 0 0 20px var(--accent-glow);
        }

        .card img {
            width: 100%;
            height: 360px;
            object-fit: cover;
            transition: 0.5s;
        }

        .card:hover img {
            filter: brightness(0.6) blur(2px);
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
            opacity: 0.8;
            transition: 0.5s;
        }

        .card:hover .card-overlay { opacity: 1; }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .card-type {
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* SCREENS */
        #detail-screen, #episodes-screen { display: none; animation: slideUp 0.6s ease-out; }

        .nav-link {
            display: inline-flex;
            align-items: center;
            color: var(--text-dim);
            text-decoration: none;
            margin-bottom: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-link:hover { color: #fff; transform: translateX(-5px); }

        /* DETAIL VIEW */
        .hero {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 60px;
            background: var(--glass);
            padding: 50px;
            border-radius: 40px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .hero-poster {
            width: 100%;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .hero-info h2 { font-size: 3rem; margin: 0; }
        .hero-info .desc { font-size: 1.1rem; color: #ccc; margin: 30px 0; max-width: 700px; }

        .play-main-btn {
            padding: 20px 50px;
            background: var(--accent);
            border: none;
            color: #fff;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px var(--accent-glow);
        }

        .play-main-btn:hover { transform: scale(1.05); box-shadow: 0 15px 30px var(--accent-glow); }

        /* PLAYER CUSTOMIZATION */
        .video-container {
            margin-top: 50px;
            border-radius: 30px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
            background: #000;
        }

        .video-js {
            width: 100% !important;
            height: auto !important;
            aspect-ratio: 16/9;
        }

        /* EPISODES GRID */
        .ep-grid {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 40px;
            margin-top: 40px;
        }

        .season-tab {
            padding: 20px;
            background: var(--glass);
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 10px;
            border: 1px solid transparent;
        }

        .season-tab.active {
            background: var(--accent);
            border-color: var(--accent);
        }

        .ep-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px;
            background: var(--glass);
            border-radius: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .ep-card:hover { background: rgba(255,255,255,0.08); transform: translateX(10px); }

        /* ANIMATIONS */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 1000px) {
            .hero { grid-template-columns: 1fr; text-align: center; justify-items: center; }
            .ep-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header id="main-header">
        <div class="logo">LumoCinema</div>
    </header>

    <div id="main-screen">
        <div class="grid" id="catalog"></div>
    </div>

    <div id="detail-screen">
        <div class="nav-link" onclick="showMain()">← Вернуться в библиотеку</div>
        <div class="hero">
            <img id="det-poster" class="hero-poster" src="" alt="">
            <div class="hero-info">
                <h2 id="det-title"></h2>
                <p class="desc" id="det-desc"></p>
                <button class="play-main-btn" id="action-btn">СМОТРЕТЬ СЕЙЧАС</button>
                
                <div id="player-wrapper" class="video-container" style="display: none;">
                    </div>
            </div>
        </div>
    </div>

    <div id="episodes-screen">
        <div class="nav-link" onclick="showDetail()">← К описанию</div>
        <h2 id="ep-header-title"></h2>
        <div class="ep-grid">
            <div id="seasons-nav"></div>
            <div id="ep-list"></div>
        </div>
    </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
    const DATABASE = [
      {
        "title": "Ниндзяго: Восстание Драконов",
        "poster": "https://raw.githubusercontent.com/LumoCreator/admincinema/refs/heads/main/IMG_1873.jpeg",
        "desc": "Мир изменился навсегда после Слияния. Новые ниндзя Сора и Арин под руководством Ллойда должны найти старых мастеров и остановить империю Когтей.",
        "type": "serial",
        "seasons": [
          {
            "number": "4",
            "episodes": [
              {
                "name": "Шепчущий дракон",
                "duration": "23:00",
                "url": "https://drive.google.com/uc?export=download&id=1qM4uZ1F4V148msGgrzvJGd8cF2iSAHpt"
              }
            ]
          }
        ]
      }
    ];

    let currentItem = null;
    let player = null;

    function init() {
        const catalog = document.getElementById('catalog');
        catalog.innerHTML = "";
        DATABASE.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openDetail(index);
            card.innerHTML = `
                <img src="${item.poster}" alt="">
                <div class="card-overlay">
                    <div class="card-type">${item.type === 'serial' ? 'Сериал' : 'Фильм'}</div>
                    <div class="card-title">${item.title}</div>
                </div>
            `;
            catalog.appendChild(card);
        });
    }

    function openDetail(index) {
        currentItem = DATABASE[index];
        document.getElementById('main-screen').style.display = 'none';
        document.getElementById('detail-screen').style.display = 'block';
        document.getElementById('det-title').innerText = currentItem.title;
        document.getElementById('det-poster').src = currentItem.poster;
        document.getElementById('det-desc').innerText = currentItem.desc;
        
        const btn = document.getElementById('action-btn');
        const wrapper = document.getElementById('player-wrapper');
        wrapper.style.display = 'none';
        wrapper.innerHTML = "";
        if (player) { player.dispose(); player = null; }

        btn.onclick = currentItem.type === 'movie' ? () => startVideo(currentItem.url) : openEpisodes;
        btn.innerText = currentItem.type === 'movie' ? 'СМОТРЕТЬ ФИЛЬМ' : 'ВЫБРАТЬ СЕРИЮ';
        window.scrollTo(0,0);
    }

    function openEpisodes() {
        document.getElementById('detail-screen').style.display = 'none';
        document.getElementById('episodes-screen').style.display = 'block';
        document.getElementById('ep-header-title').innerText = currentItem.title;
        
        const nav = document.getElementById('seasons-nav');
        nav.innerHTML = "";
        currentItem.seasons.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = `season-tab ${i === 0 ? 'active' : ''}`;
            div.innerText = `Сезон ${s.number}`;
            div.onclick = () => {
                document.querySelectorAll('.season-tab').forEach(t => t.classList.remove('active'));
                div.classList.add('active');
                renderEpisodes(i);
            };
            nav.appendChild(div);
        });
        renderEpisodes(0);
    }

    function renderEpisodes(idx) {
        const list = document.getElementById('ep-list');
        list.innerHTML = "";
        currentItem.seasons[idx].episodes.forEach((ep, i) => {
            const div = document.createElement('div');
            div.className = 'ep-card';
            div.innerHTML = `
                <div>
                    <b style="color:var(--accent); margin-right:15px;">${i+1}</b>
                    <span>${ep.name}</span>
                </div>
                <span style="color:var(--text-dim)">${ep.duration}</span>
            `;
            div.onclick = () => { showDetail(); startVideo(ep.url); };
            list.appendChild(div);
        });
    }

    function startVideo(url) {
        const wrapper = document.getElementById('player-wrapper');
        wrapper.style.display = 'block';
        wrapper.innerHTML = `
            <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" width="640" height="264">
                <source src="${url}" type="video/mp4">
            </video>
        `;

        player = videojs('my-video', {
            fluid: true,
            playbackRates: [0.5, 1, 1.5, 2],
            controlBar: {
                children: [
                    'playToggle',
                    'volumePanel',
                    'currentTimeDisplay',
                    'timeDivider',
                    'durationDisplay',
                    'progressControl',
                    'playbackRateMenuButton',
                    'fullscreenToggle',
                ],
            }
        });

        player.ready(function() {
            player.play();
            wrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
        });
    }

    function showMain() {
        document.getElementById('main-screen').style.display = 'block';
        document.getElementById('detail-screen').style.display = 'none';
        document.getElementById('episodes-screen').style.display = 'none';
        if (player) { player.dispose(); player = null; }
    }

    function showDetail() {
        document.getElementById('detail-screen').style.display = 'block';
        document.getElementById('episodes-screen').style.display = 'none';
    }

    window.onload = init;
</script>
</body>
</html>
