<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumoCinema — Твой онлайн кинотеатр</title>
    <style>
        /* ОСНОВНЫЕ СТИЛИ */
        :root {
            --bg: #0a0a0b;
            --accent: #e50914; /* Красный как у Netflix */
            --card-bg: #161618;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, #1a1a1f 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, #131318 0%, transparent 40%);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* ШАПКА */
        header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease;
        }

        header h1 {
            font-size: 3rem;
            letter-spacing: -1px;
            margin: 0;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* СЕТКА КАТАЛОГА */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
            animation: fadeInUp 1s ease;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card:hover {
            transform: scale(1.05) translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border-color: rgba(255,255,255,0.2);
        }

        .card img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            transition: 0.4s;
        }

        .card:hover img { filter: brightness(0.7); }

        .card-info {
            padding: 15px;
            background: linear-gradient(to top, var(--card-bg), transparent);
            position: absolute;
            bottom: 0;
            width: 100%;
            text-align: left;
        }

        .card-info span {
            display: block;
            font-size: 1.1rem;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* ЭКРАН ДЕТАЛЕЙ */
        #detail-screen, #episodes-screen { 
            display: none; 
            animation: fadeIn 0.5s ease;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-dim);
            margin-bottom: 30px;
            transition: 0.3s;
            font-weight: 500;
        }

        .back-btn:hover { color: #fff; }

        .detail-layout {
            display: flex;
            gap: 50px;
            flex-wrap: wrap;
            background: var(--glass);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .detail-poster {
            width: 350px;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            animation: fadeInLeft 0.8s ease;
        }

        .detail-content {
            flex: 1;
            min-width: 300px;
        }

        .detail-content h2 {
            font-size: 2.5rem;
            margin-top: 0;
        }

        .desc {
            font-size: 1.1rem;
            color: var(--text-dim);
            line-height: 1.7;
            margin: 25px 0;
        }

        .btn-play {
            background: #fff;
            color: #000;
            border: none;
            padding: 18px 40px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-play:hover {
            transform: scale(1.05);
            background: var(--accent);
            color: #fff;
        }

        /* СПИСОК СЕРИЙ */
        .ep-container {
            display: flex;
            gap: 30px;
            margin-top: 40px;
        }

        .seasons-nav {
            width: 200px;
        }

        .season-btn {
            padding: 15px 20px;
            cursor: pointer;
            border-radius: 12px;
            margin-bottom: 10px;
            background: var(--glass);
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .season-btn.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 10px 20px rgba(229, 9, 20, 0.3);
        }

        .ep-list { flex: 1; }

        .ep-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--glass);
            margin-bottom: 12px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .ep-item:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
            padding-left: 30px;
        }

        /* ПЛЕЕР */
        .video-wrapper {
            margin-top: 40px;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            padding-top: 56.25%; /* 16:9 */
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* АНИМАЦИИ */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInLeft { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }

        /* МОБИЛЬНАЯ АДАПТАЦИЯ */
        @media (max-width: 768px) {
            .detail-layout { padding: 20px; gap: 20px; }
            .detail-poster { width: 100%; }
            .ep-container { flex-direction: column; }
            .seasons-nav { width: 100%; display: flex; gap: 10px; overflow-x: auto; }
            .season-btn { white-space: nowrap; }
            header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="main-screen">
        <header>
            <h1>LumoCinema</h1>
        </header>
        <div class="grid" id="catalog"></div>
    </div>

    <div id="detail-screen">
        <div class="back-btn" onclick="showMain()">← Назад в каталог</div>
        <div class="detail-layout">
            <img id="det-poster" class="detail-poster" src="" alt="Постер">
            <div class="detail-content">
                <h2 id="det-title"></h2>
                <p class="desc" id="det-desc"></p>
                <button id="action-btn" class="btn-play">
                    <span>▶</span> <span id="btn-text">Смотреть</span>
                </button>
                
                <div id="player-area" style="display:none;" class="video-wrapper">
                    </div>
            </div>
        </div>
    </div>

    <div id="episodes-screen">
        <div class="back-btn" onclick="showDetail()">← К описанию</div>
        <h2 id="ep-title-header" style="font-size: 2rem; margin-bottom: 30px;"></h2>
        <div class="ep-container">
            <div class="seasons-nav" id="seasons-nav"></div>
            <div class="ep-list" id="ep-list"></div>
        </div>
    </div>
</div>

<script>
    // ТВОЯ БАЗА ДАННЫХ
    const DATABASE = [
      {
        "title": "Ниндзяго: Восстание Драконов",
        "poster": "https://raw.githubusercontent.com/LumoCreator/admincinema/refs/heads/main/IMG_1873.jpeg",
        "desc": "События разворачиваются после Великого Слияния. Новые герои и старые мастера объединяются, чтобы защитить мир от новой угрозы.",
        "type": "serial",
        "seasons": [
          {
            "number": "4",
            "episodes": [
              {
                "name": "Шепчущий дракон",
                "duration": "23 мин.",
                "url": "https://drive.google.com/uc?export=download&id=1qM4uZ1F4V148msGgrzvJGd8cF2iSAHpt"
              }
            ]
          }
        ]
      }
    ];

    let currentItem = null;

    function init() {
        const catalog = document.getElementById('catalog');
        catalog.innerHTML = "";
        
        DATABASE.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.animationDelay = (index * 0.1) + "s";
            card.onclick = () => openDetail(index);
            
            card.innerHTML = `
                <img src="${item.poster || ''}" loading="lazy">
                <div class="card-info">
                    <span>${item.title || "Без названия"}</span>
                    <small style="color: #888;">${item.type === 'serial' ? 'Сериал' : 'Фильм'}</small>
                </div>
            `;
            catalog.appendChild(card);
        });
    }

    function openDetail(index) {
        currentItem = DATABASE[index];
        window.scrollTo({ top: 0, behavior: 'smooth' });
        
        document.getElementById('main-screen').style.display = 'none';
        document.getElementById('detail-screen').style.display = 'block';
        
        document.getElementById('det-title').innerText = currentItem.title;
        document.getElementById('det-poster').src = currentItem.poster;
        document.getElementById('det-desc').innerText = currentItem.desc;
        
        const btnText = document.getElementById('btn-text');
        const playerArea = document.getElementById('player-area');
        playerArea.style.display = 'none';
        playerArea.innerHTML = "";

        if (currentItem.type === 'movie') {
            btnText.innerText = "Смотреть фильм";
            document.getElementById('action-btn').onclick = () => startPlayer(currentItem.url);
        } else {
            btnText.innerText = "Выбрать серию";
            document.getElementById('action-btn').onclick = openEpisodes;
        }
    }

    function openEpisodes() {
        document.getElementById('detail-screen').style.display = 'none';
        document.getElementById('episodes-screen').style.display = 'block';
        document.getElementById('ep-title-header').innerText = currentItem.title;
        
        const nav = document.getElementById('seasons-nav');
        nav.innerHTML = "";
        
        currentItem.seasons.forEach((season, sIdx) => {
            const sBtn = document.createElement('div');
            sBtn.className = 'season-btn' + (sIdx === 0 ? ' active' : '');
            sBtn.innerText = `Сезон ${season.number}`;
            sBtn.onclick = () => {
                document.querySelectorAll('.season-btn').forEach(b => b.classList.remove('active'));
                sBtn.classList.add('active');
                renderEpisodes(sIdx);
            };
            nav.appendChild(sBtn);
        });
        
        renderEpisodes(0);
    }

    function renderEpisodes(sIdx) {
        const list = document.getElementById('ep-list');
        list.innerHTML = "";
        const episodes = currentItem.seasons[sIdx].episodes;

        episodes.forEach((ep, i) => {
            const item = document.createElement('div');
            item.className = 'ep-item';
            item.style.animation = `fadeInUp ${0.3 + (i * 0.1)}s ease`;
            item.innerHTML = `
                <div style="display: flex; align-items: center; gap: 15px;">
                    <span style="color: var(--accent); font-weight: bold;">${i + 1}</span>
                    <span>${ep.name || "Без названия"}</span>
                </div>
                <span style="color: var(--text-dim); font-size: 0.9rem;">${ep.duration || "?"}</span>
            `;
            item.onclick = () => {
                showDetail();
                startPlayer(ep.url);
            };
            list.appendChild(item);
        });
    }

    function startPlayer(url) {
        const playerArea = document.getElementById('player-area');
        playerArea.style.display = 'block';
        
        let finalUrl = url;
        if (url.includes('drive.google.com')) {
            // Превращаем в формат превью с разрешением на полноэкранный режим
            const fileId = url.split('id=')[1] || url.split('/d/')[1].split('/')[0];
            finalUrl = `https://drive.google.com/file/d/${fileId}/preview`;
        }

        // Атрибуты allowfullscreen крайне важны для работы кнопки развертывания
        playerArea.innerHTML = `
            <iframe 
                src="${finalUrl}" 
                allow="autoplay; fullscreen" 
                allowfullscreen="true" 
                webkitallowfullscreen="true" 
                mozallowfullscreen="true">
            </iframe>`;
        
        setTimeout(() => {
            playerArea.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 300);
    }

    function showMain() {
        document.getElementById('main-screen').style.display = 'block';
        document.getElementById('detail-screen').style.display = 'none';
        document.getElementById('episodes-screen').style.display = 'none';
        document.getElementById('player-area').innerHTML = ""; 
    }

    function showDetail() {
        document.getElementById('detail-screen').style.display = 'block';
        document.getElementById('episodes-screen').style.display = 'none';
    }

    window.onload = init;
</script>

</body>
</html>
