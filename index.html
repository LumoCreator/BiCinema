<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumoCinema — Premium Streaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050506;
            --accent: #ff003c;
            --card-bg: #111113;
            --glass: rgba(255, 255, 255, 0.03);
            --text-main: #ffffff;
            --text-dim: #88888e;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Manrope', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1e1e2e 0%, #050506 100%);
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* LOGO */
        .logo {
            font-size: 2.2rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 50px;
            letter-spacing: -1.5px;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeInDown 0.8s ease;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 35px;
            animation: fadeInUp 1s ease;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 15px rgba(255, 0, 60, 0.2);
        }

        .card img {
            width: 100%;
            height: 330px;
            object-fit: cover;
            transition: 0.4s;
        }

        .card-info {
            padding: 15px;
            background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 100%);
            position: absolute;
            bottom: 0; width: 100%;
        }

        /* SCREENS */
        #detail-screen, #episodes-screen { display: none; animation: fadeIn 0.5s ease; }

        .btn-back {
            color: var(--text-dim);
            cursor: pointer;
            margin-bottom: 25px;
            display: inline-block;
            transition: 0.3s;
        }
        .btn-back:hover { color: #fff; transform: translateX(-5px); }

        /* DETAIL PAGE */
        .detail-card {
            display: flex;
            gap: 50px;
            background: var(--glass);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.05);
            flex-wrap: wrap;
        }

        .detail-poster {
            width: 320px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .detail-info { flex: 1; min-width: 300px; }
        .detail-info h2 { font-size: 2.8rem; margin: 0; }
        .detail-info p { color: var(--text-dim); line-height: 1.7; margin: 25px 0; font-size: 1.1rem; }

        .btn-play {
            padding: 18px 45px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 40px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }

        .btn-play:hover {
            background: var(--accent);
            color: #fff;
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(255, 0, 60, 0.3);
        }

        /* EPISODES */
        .ep-layout { display: grid; grid-template-columns: 200px 1fr; gap: 30px; margin-top: 30px; }
        
        .season-btn {
            padding: 15px;
            background: var(--glass);
            margin-bottom: 10px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            border: 1px solid transparent;
            transition: 0.3s;
        }
        .season-btn.active { background: var(--accent); border-color: var(--accent); }

        .episode-card {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            background: var(--glass);
            border-radius: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.3s;
        }
        .episode-card:hover { background: rgba(255,255,255,0.08); transform: translateX(10px); }

        /* PLAYER */
        .player-container {
            margin-top: 40px;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* ANIMATIONS */
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 800px) {
            .detail-card { padding: 20px; text-align: center; justify-content: center; }
            .detail-poster { width: 100%; max-width: 280px; }
            .ep-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">LumoCinema</div>

    <div id="main-screen">
        <div class="grid" id="catalog"></div>
    </div>

    <div id="detail-screen">
        <div class="btn-back" onclick="showMain()">← Назад в каталог</div>
        <div class="detail-card">
            <img id="det-poster" class="detail-poster" src="" alt="">
            <div class="detail-info">
                <h2 id="det-title"></h2>
                <p id="det-desc"></p>
                <button class="btn-play" id="action-btn">СМОТРЕТЬ</button>
                <div id="video-box" class="player-container" style="display: none;"></div>
            </div>
        </div>
    </div>

    <div id="episodes-screen">
        <div class="btn-back" onclick="showDetail()">← К описанию</div>
        <h2 id="ep-main-title"></h2>
        <div class="ep-layout">
            <div id="seasons-nav"></div>
            <div id="ep-list"></div>
        </div>
    </div>
</div>

<script>
    const DATABASE = [
      {
        "title": "Ниндзяго: Восстание Драконов",
        "poster": "https://raw.githubusercontent.com/LumoCreator/admincinema/refs/heads/main/IMG_1873.jpeg",
        "desc": "События разворачиваются после Великого Слияния. Новые герои Сора и Арин под руководством Ллойда должны спасти миры.",
        "type": "serial",
        "seasons": [
          {
            "number": "4",
            "episodes": [
              {
                "name": "Шепчущий дракон",
                "duration": "23:00",
                "url": "https://drive.google.com/uc?export=download&id=1qM4uZ1F4V148msGgrzvJGd8cF2iSAHpt"
              }
            ]
          }
        ]
      }
    ];

    function init() {
        const catalog = document.getElementById('catalog');
        catalog.innerHTML = "";
        DATABASE.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openDetail(index);
            card.innerHTML = `
                <img src="${item.poster}">
                <div class="card-info">
                    <div style="font-size: 0.8rem; color: var(--accent); font-weight: 800;">${item.type === 'serial' ? 'СЕРИАЛ' : 'ФИЛЬМ'}</div>
                    <div style="font-weight: 800;">${item.title}</div>
                </div>
            `;
            catalog.appendChild(card);
        });
    }

    let currentItem = null;

    function openDetail(index) {
        currentItem = DATABASE[index];
        document.getElementById('main-screen').style.display = 'none';
        document.getElementById('detail-screen').style.display = 'block';
        document.getElementById('det-title').innerText = currentItem.title;
        document.getElementById('det-poster').src = currentItem.poster;
        document.getElementById('det-desc').innerText = currentItem.desc;
        
        const videoBox = document.getElementById('video-box');
        videoBox.style.display = 'none';
        videoBox.innerHTML = "";

        const btn = document.getElementById('action-btn');
        btn.onclick = currentItem.type === 'movie' ? () => startPlayer(currentItem.url) : openEpisodes;
        btn.innerText = currentItem.type === 'movie' ? 'СМОТРЕТЬ ФИЛЬМ' : 'ВЫБРАТЬ СЕРИЮ';
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function openEpisodes() {
        document.getElementById('detail-screen').style.display = 'none';
        document.getElementById('episodes-screen').style.display = 'block';
        document.getElementById('ep-main-title').innerText = currentItem.title;
        
        const nav = document.getElementById('seasons-nav');
        nav.innerHTML = "";
        currentItem.seasons.forEach((s, i) => {
            const d = document.createElement('div');
            d.className = `season-btn ${i === 0 ? 'active' : ''}`;
            d.innerText = `Сезон ${s.number}`;
            d.onclick = () => {
                document.querySelectorAll('.season-btn').forEach(t => t.classList.remove('active'));
                d.classList.add('active');
                renderEpisodes(i);
            };
            nav.appendChild(d);
        });
        renderEpisodes(0);
    }

    function renderEpisodes(idx) {
        const list = document.getElementById('ep-list');
        list.innerHTML = "";
        currentItem.seasons[idx].episodes.forEach(ep => {
            const d = document.createElement('div');
            d.className = 'episode-card';
            d.innerHTML = `<span>${ep.name}</span><span style="color:var(--text-dim)">${ep.duration}</span>`;
            d.onclick = () => { showDetail(); startPlayer(ep.url); };
            list.appendChild(d);
        });
    }

    function startPlayer(url) {
        const box = document.getElementById('video-box');
        box.style.display = 'block';
        
        // Магия преобразования ссылки для обхода 404 и блокировки полноэкранного режима
        let fileId = "";
        if (url.includes('id=')) {
            fileId = url.split('id=')[1].split('&')[0];
        } else {
            fileId = url.split('/d/')[1].split('/')[0];
        }
        
        const finalUrl = `https://drive.google.com/file/d/${fileId}/preview`;

        // Генерируем iframe с ПРАВИЛЬНЫМИ доступами для полного экрана
        box.innerHTML = `
            <iframe 
                src="${finalUrl}" 
                allow="autoplay; fullscreen" 
                allowfullscreen="true" 
                webkitallowfullscreen="true" 
                mozallowfullscreen="true">
            </iframe>
        `;
        
        setTimeout(() => box.scrollIntoView({ behavior: 'smooth', block: 'center' }), 200);
    }

    function showMain() {
        document.getElementById('main-screen').style.display = 'block';
        document.getElementById('detail-screen').style.display = 'none';
        document.getElementById('episodes-screen').style.display = 'none';
    }

    function showDetail() {
        document.getElementById('detail-screen').style.display = 'block';
        document.getElementById('episodes-screen').style.display = 'none';
    }

    window.onload = init;
</script>
</body>
</html>
