<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BiCinema Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --orange: #ff8c00;
            --bg: #000000;
            --surface: #121212;
            --text: #ffffff;
            --text-gray: #888888;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.4;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 15px;
        }

        /* HEADER */
        header {
            padding: 25px 0;
            text-align: center;
            border-bottom: 1px solid #1a1a1a;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--orange);
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        /* КАТАЛОГ */
        .catalog {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid #222;
        }

        .card:active { transform: scale(0.95); }

        .card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }

        .card-info { padding: 10px; }
        .card-title { font-size: 0.9rem; font-weight: 600; }

        /* ЭКРАНЫ */
        .page { display: none; padding-bottom: 40px; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-back {
            background: #1a1a1a;
            border: none;
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-weight: 600;
            cursor: pointer;
        }

        /* ДЕТАЛИ */
        .hero {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .hero img {
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .hero-text h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .hero-text p { color: var(--text-gray); font-size: 0.95rem; margin-bottom: 20px; }

        .btn-play {
            width: 100%;
            padding: 18px;
            background: var(--orange);
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 900;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
        }

        /* ПЛЕЕР: ИСПРАВЛЕНИЕ ДЛЯ АЙФОНА */
        .player-box {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 */
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 20px;
            border: 1px solid #333;
        }

        .player-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            /* Предотвращаем конфликты с системными жестами */
            touch-action: manipulation;
        }

        /* СПИСОК СЕРИЙ */
        .ep-list {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ep-item {
            background: var(--surface);
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .ep-item:hover { background: #222; }

        @media (min-width: 768px) {
            .hero { flex-direction: row; gap: 40px; }
            .hero img { width: 300px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header><div class="logo">BiCinema</div></header>

    <div id="page-main" class="page active">
        <div class="catalog" id="catalog-container"></div>
    </div>

    <div id="page-detail" class="page">
        <button class="btn-back" onclick="goPage('page-main')">← Назад</button>
        <div class="hero">
            <img id="det-img" src="" alt="">
            <div class="hero-text">
                <h1 id="det-title"></h1>
                <p id="det-desc"></p>
                <button class="btn-play" id="btn-action">СМОТРЕТЬ</button>
                <div id="player-wrap" class="player-box" style="display: none;"></div>
            </div>
        </div>
    </div>

    <div id="page-episodes" class="page">
        <button class="btn-back" onclick="goPage('page-detail')">← К описанию</button>
        <h2 id="ep-title"></h2>
        <div class="ep-list" id="ep-container"></div>
    </div>
</div>

<script>
    const DATA = [
      {
        "title": "Ниндзяго: Восстание Драконов",
        "poster": "https://raw.githubusercontent.com/LumoCreator/admincinema/refs/heads/main/IMG_1873.jpeg",
        "desc": "Объединенные земли после Слияния нуждаются в героях. Сора и Арин под руководством Ллойда должны спасти мир.",
        "type": "serial",
        "seasons": [
          {
            "num": "4",
            "eps": [
              { "name": "Шепчущий дракон", "time": "23:00", "url": "https://drive.google.com/uc?export=download&id=1qM4uZ1F4V148msGgrzvJGd8cF2iSAHpt" }
            ]
          }
        ]
      }
    ];

    function init() {
        const cont = document.getElementById('catalog-container');
        cont.innerHTML = "";
        DATA.forEach((item, i) => {
            const el = document.createElement('div');
            el.className = 'card';
            el.onclick = () => openItem(i);
            el.innerHTML = `<img src="${item.poster}"><div class="card-info"><div class="card-title">${item.title}</div></div>`;
            cont.appendChild(el);
        });
    }

    let cur = null;

    function openItem(i) {
        cur = DATA[i];
        document.getElementById('det-title').innerText = cur.title;
        document.getElementById('det-img').src = cur.poster;
        document.getElementById('det-desc').innerText = cur.desc;
        
        document.getElementById('player-wrap').style.display = 'none';
        document.getElementById('player-wrap').innerHTML = "";

        const btn = document.getElementById('btn-action');
        if(cur.type === 'movie') {
            btn.innerText = "Смотреть фильм";
            btn.onclick = () => start(cur.url);
        } else {
            btn.innerText = "Выбрать серию";
            btn.onclick = openEps;
        }
        goPage('page-detail');
    }

    function openEps() {
        document.getElementById('ep-title').innerText = cur.title;
        const cont = document.getElementById('ep-container');
        cont.innerHTML = "";
        cur.seasons[0].eps.forEach(ep => {
            const el = document.createElement('div');
            el.className = 'ep-item';
            el.innerHTML = `<span>${ep.name}</span><span style="color:var(--orange)">${ep.time}</span>`;
            el.onclick = () => { goPage('page-detail'); start(ep.url); };
            cont.appendChild(el);
        });
        goPage('page-episodes');
    }

    function start(url) {
        const wrap = document.getElementById('player-wrap');
        wrap.style.display = 'block';
        
        let id = "";
        if(url.includes('id=')) id = url.split('id=')[1].split('&')[0];
        else id = url.split('/d/')[1].split('/')[0];
        
        const driveUrl = `https://drive.google.com/file/d/${id}/preview`;

        // КЛЮЧЕВОЙ МОМЕНТ: playsinline для iOS и очистка атрибутов
        wrap.innerHTML = `
            <iframe 
                src="${driveUrl}" 
                allow="autoplay; fullscreen"
                allowfullscreen="true"
                webkitallowfullscreen="true"
                mozallowfullscreen="true"
                playsinline="1">
            </iframe>
        `;
        
        wrap.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function goPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    window.onload = init;
</script>

</body>
</html>
