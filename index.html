<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiCinema | Orange Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #ff8800; /* Твой оранжевый цвет */
            --accent-glow: rgba(255, 136, 0, 0.3);
            --card-bg: #161616;
            --text: #ffffff;
            --text-dim: #999999;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* HEADER */
        header {
            padding: 40px 0;
            text-align: center;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--accent);
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--accent-glow);
        }

        /* КАТАЛОГ */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            animation: fadeIn 0.8s ease;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px var(--accent-glow);
            border-color: var(--accent);
        }

        .card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            display: block;
        }

        .card-body {
            padding: 15px;
        }

        .card-type {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ЭКРАНЫ */
        .screen {
            display: none;
            animation: fadeIn 0.4s ease-in-out;
        }

        .active-screen {
            display: block;
        }

        .back-link {
            display: inline-block;
            color: var(--text-dim);
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .back-link:hover { color: var(--accent); }

        /* ДЕТАЛИ */
        .details-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .details-poster {
            flex: 0 0 300px;
            max-width: 100%;
        }

        .details-poster img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .details-info {
            flex: 1;
            min-width: 300px;
        }

        .details-info h2 {
            font-size: 2.2rem;
            margin-bottom: 15px;
        }

        .details-info p {
            color: var(--text-dim);
            margin-bottom: 25px;
        }

        .btn-play {
            padding: 15px 40px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-play:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* ПЛЕЕР */
        .player-box {
            margin-top: 30px;
            width: 100%;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            /* Соотношение сторон 16:9 */
            aspect-ratio: 16 / 9;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* СПИСОК СЕРИЙ */
        .episodes-grid {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .season-tabs {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .season-tab {
            padding: 12px;
            background: var(--glass);
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .season-tab.active {
            background: var(--accent);
            color: #000;
            font-weight: 800;
        }

        .episode-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .episode-item {
            display: flex;
            justify-content: space-between;
            padding: 18px;
            background: var(--glass);
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .episode-item:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(5px);
        }

        /* АНИМАЦИИ */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* АДАПТИВНОСТЬ */
        @media (max-width: 768px) {
            .details-wrapper { flex-direction: column; align-items: center; text-align: center; }
            .details-poster { flex: 0 0 auto; width: 220px; }
            .episodes-grid { grid-template-columns: 1fr; }
            .season-tabs { flex-direction: row; overflow-x: auto; padding-bottom: 10px; }
            .season-tab { min-width: 100px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">BiCinema</div>
    </header>

    <div id="screen-main" class="screen active-screen">
        <div class="grid" id="catalog-grid"></div>
    </div>

    <div id="screen-detail" class="screen">
        <div class="back-link" onclick="changeScreen('screen-main')">← Назад к списку</div>
        <div class="details-wrapper">
            <div class="details-poster">
                <img id="det-img" src="" alt="">
            </div>
            <div class="details-info">
                <h2 id="det-title"></h2>
                <p id="det-desc"></p>
                <button class="btn-play" id="main-action-btn">СМОТРЕТЬ</button>
                
                <div id="player-container" class="player-box" style="display: none;"></div>
            </div>
        </div>
    </div>

    <div id="screen-episodes" class="screen">
        <div class="back-link" onclick="changeScreen('screen-detail')">← К описанию</div>
        <h2 id="ep-main-title" style="margin-bottom: 25px;"></h2>
        <div class="episodes-grid">
            <div class="season-tabs" id="season-nav"></div>
            <div class="episode-list" id="ep-list"></div>
        </div>
    </div>
</div>

<script>
    const DATABASE = [
      {
        "title": "Ниндзяго: Восстание Драконов",
        "poster": "https://raw.githubusercontent.com/LumoCreator/admincinema/refs/heads/main/IMG_1873.jpeg",
        "desc": "Легендарная сага продолжается в новом мире. Объединенные земли нуждаются в новых героях Соре и Арине, которые под руководством Ллойда должны остановить надвигающуюся тьму.",
        "type": "serial",
        "seasons": [
          {
            "number": "4",
            "episodes": [
              {
                "name": "Шепчущий дракон",
                "duration": "23:00",
                "url": "https://drive.google.com/uc?export=download&id=1qM4uZ1F4V148msGgrzvJGd8cF2iSAHpt"
              }
            ]
          }
        ]
      }
    ];

    let currentItem = null;

    function init() {
        const grid = document.getElementById('catalog-grid');
        grid.innerHTML = "";
        DATABASE.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => showDetails(index);
            card.innerHTML = `
                <img src="${item.poster}" loading="lazy">
                <div class="card-body">
                    <div class="card-type">${item.type === 'serial' ? 'Сериал' : 'Фильм'}</div>
                    <div class="card-title">${item.title}</div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function showDetails(idx) {
        currentItem = DATABASE[idx];
        document.getElementById('det-title').innerText = currentItem.title;
        document.getElementById('det-img').src = currentItem.poster;
        document.getElementById('det-desc').innerText = currentItem.desc;
        
        const playerCont = document.getElementById('player-container');
        playerCont.style.display = 'none';
        playerCont.innerHTML = "";

        const btn = document.getElementById('main-action-btn');
        if(currentItem.type === 'movie') {
            btn.innerText = "СМОТРЕТЬ ФИЛЬМ";
            btn.onclick = () => startPlayer(currentItem.url);
        } else {
            btn.innerText = "ВЫБРАТЬ СЕРИЮ";
            btn.onclick = () => showEpisodes();
        }

        changeScreen('screen-detail');
    }

    function showEpisodes() {
        document.getElementById('ep-main-title').innerText = currentItem.title;
        const nav = document.getElementById('season-nav');
        nav.innerHTML = "";
        
        currentItem.seasons.forEach((s, i) => {
            const tab = document.createElement('div');
            tab.className = `season-tab ${i === 0 ? 'active' : ''}`;
            tab.innerText = `Сезон ${s.number}`;
            tab.onclick = () => {
                document.querySelectorAll('.season-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                renderEpisodes(i);
            };
            nav.appendChild(tab);
        });
        
        renderEpisodes(0);
        changeScreen('screen-episodes');
    }

    function renderEpisodes(sIdx) {
        const list = document.getElementById('ep-list');
        list.innerHTML = "";
        currentItem.seasons[sIdx].episodes.forEach(ep => {
            const item = document.createElement('div');
            item.className = 'episode-item';
            item.innerHTML = `<span>${ep.name}</span><span style="color:var(--text-dim)">${ep.duration}</span>`;
            item.onclick = () => {
                changeScreen('screen-detail');
                startPlayer(ep.url);
            };
            list.appendChild(item);
        });
    }

    function startPlayer(url) {
        const cont = document.getElementById('player-container');
        cont.style.display = 'block';
        
        let id = "";
        if(url.includes('id=')) id = url.split('id=')[1].split('&')[0];
        else id = url.split('/d/')[1].split('/')[0];
        
        const driveUrl = `https://drive.google.com/file/d/${id}/preview`;

        cont.innerHTML = `
            <iframe 
                src="${driveUrl}" 
                allow="autoplay; fullscreen" 
                allowfullscreen="true">
            </iframe>
        `;
        
        setTimeout(() => cont.scrollIntoView({ behavior: 'smooth', block: 'center' }), 200);
    }

    function changeScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(screenId).classList.add('active-screen');
        window.scrollTo(0,0);
    }

    window.onload = init;
</script>

</body>
</html>
