<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BiCinema Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #ff8c00;
            --bg: #000000;
            --surface: #111111;
            --text: #ffffff;
            --text-dim: #999999;
            --radius: 16px;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-user-select: none;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 15px;
        }

        header {
            padding: 30px 0;
            text-align: center;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: -1.5px;
        }

        /* КАТАЛОГ */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            padding-bottom: 40px;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card:active { transform: scale(0.96); }

        .card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            display: block;
        }

        .card-info { padding: 12px; }
        .card-title { font-size: 0.9rem; font-weight: 700; }

        /* ЭКРАНЫ */
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-back {
            background: #1a1a1a;
            border: none;
            color: #fff;
            padding: 12px 20px;
            border-radius: 10px;
            margin: 15px 0;
            font-weight: 700;
            cursor: pointer;
        }

        /* ДЕТАЛИ */
        .detail-view {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .hero-poster {
            width: 100%;
            max-width: 320px;
            border-radius: var(--radius);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            margin: 0 auto;
        }

        .hero-text h1 { font-size: 2rem; margin-bottom: 10px; }
        .hero-text p { color: var(--text-dim); margin-bottom: 25px; }

        .btn-main {
            width: 100%;
            padding: 18px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius);
            color: #000;
            font-weight: 900;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
        }

        /* ПЛЕЕР (ИСПРАВЛЕННЫЙ) */
        .player-wrapper {
            margin-top: 25px;
            width: 100%;
            background: #000;
            border-radius: var(--radius);
            overflow: hidden;
            position: relative;
            padding-top: 56.25%; /* 16:9 */
            border: 1px solid #222;
        }

        iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }

        /* СЕРИИ */
        .ep-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .ep-row {
            background: var(--surface);
            padding: 18px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .ep-row:active { border-color: var(--accent); background: #1a1a1a; }
        .ep-name { font-weight: 700; }
        .ep-time { color: var(--accent); font-weight: 900; font-size: 0.8rem; }

        @media (min-width: 768px) {
            .detail-view { flex-direction: row; gap: 40px; align-items: flex-start; }
            .hero-poster { margin: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <header><div class="logo">BiCinema</div></header>

    <div id="p-main" class="page active">
        <div class="grid" id="catalog-grid"></div>
    </div>

    <div id="p-item" class="page">
        <button class="btn-back" onclick="nav('p-main')">← Назад</button>
        <div class="detail-view">
            <img id="m-img" src="" class="hero-poster" alt="">
            <div class="hero-text">
                <h1 id="m-title"></h1>
                <p id="m-desc"></p>
                <button class="btn-main" id="m-btn">СМОТРЕТЬ</button>
                <div id="player-container" class="player-wrapper" style="display: none;"></div>
            </div>
        </div>
    </div>

    <div id="p-eps" class="page">
        <button class="btn-back" onclick="nav('p-item')">← К описанию</button>
        <h2 id="eps-title" style="margin-bottom: 20px;"></h2>
        <div class="ep-list" id="eps-list"></div>
    </div>
</div>

<script>
    const DB = [
      {
        "title": "Ниндзяго: Восстание Драконов",
        "poster": "https://raw.githubusercontent.com/LumoCreator/admincinema/refs/heads/main/IMG_1873.jpeg",
        "desc": "Миры слились воедино. Новые герои должны научиться силе стихий, чтобы спасти будущее от захватчиков.",
        "type": "serial",
        "seasons": [
          {
            "eps": [
              { "name": "Шепчущий дракон", "time": "23:00", "url": "https://drive.google.com/uc?export=download&id=1qM4uZ1F4V148msGgrzvJGd8cF2iSAHpt" }
            ]
          }
        ]
      }
    ];

    function init() {
        const grid = document.getElementById('catalog-grid');
        grid.innerHTML = "";
        DB.forEach((item, i) => {
            const el = document.createElement('div');
            el.className = 'card';
            el.onclick = () => showItem(i);
            el.innerHTML = `<img src="${item.poster}"><div class="card-info"><div class="card-title">${item.title}</div></div>`;
            grid.appendChild(el);
        });
    }

    let currentItem = null;

    function showItem(i) {
        currentItem = DB[i];
        document.getElementById('m-title').innerText = currentItem.title;
        document.getElementById('m-img').src = currentItem.poster;
        document.getElementById('m-desc').innerText = currentItem.desc;
        
        const playerWrap = document.getElementById('player-container');
        playerWrap.style.display = 'none';
        playerWrap.innerHTML = "";

        const btn = document.getElementById('m-btn');
        if(currentItem.type === 'movie') {
            btn.innerText = "Смотреть фильм";
            btn.onclick = () => startPlayer(currentItem.url);
        } else {
            btn.innerText = "Выбрать серию";
            btn.onclick = showEps;
        }
        nav('p-item');
    }

    function showEps() {
        document.getElementById('eps-title').innerText = currentItem.title;
        const list = document.getElementById('eps-list');
        list.innerHTML = "";
        currentItem.seasons[0].eps.forEach(ep => {
            const row = document.createElement('div');
            row.className = 'ep-row';
            row.innerHTML = `<span class="ep-name">${ep.name}</span><span class="ep-time">${ep.time}</span>`;
            row.onclick = () => { nav('p-item'); startPlayer(ep.url); };
            list.appendChild(row);
        });
        nav('p-eps');
    }

    function startPlayer(url) {
        const wrap = document.getElementById('player-container');
        wrap.style.display = 'block';
        
        let id = "";
        if(url.includes('id=')) id = url.split('id=')[1].split('&')[0];
        else id = url.split('/d/')[1].split('/')[0];
        
        const finalUrl = `https://drive.google.com/file/d/${id}/preview`;

        // КЛЮЧЕВОЙ МОМЕНТ: allow="fullscreen"
        wrap.innerHTML = `
            <iframe 
                src="${finalUrl}" 
                allow="autoplay; fullscreen; picture-in-picture; xr-spatial-tracking"
                allowfullscreen="true" 
                webkitallowfullscreen="true" 
                mozallowfullscreen="true">
            </iframe>
        `;
        
        setTimeout(() => wrap.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
    }

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    window.onload = init;
</script>

</body>
</html>
